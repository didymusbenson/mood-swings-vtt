name: Deploy app to GitHub Pages

# Builds @mood-swings/app and publishes packages/app/dist to GitHub Pages.
#
# v2 deployment: the live site is published from the feature branch
# `claude/v2-deployment-strategy-iorlce` (Goldfish + networked Host/Join multiplayer).
# It deploys on every push to that branch, and can be run by hand from the Actions
# tab (workflow_dispatch). `main` no longer auto-deploys — to make main authoritative
# again later, add `main` back to the branches list (or merge this branch into main).
#
# One-time repo setup (human, if not already set): Settings -> Pages -> Build and
# deployment -> Source: "GitHub Actions". Confirm the `github-pages` environment has
# no protection rule restricting deploys to `main`. Site URL:
# https://didymusbenson.github.io/mood-swings-vtt/

on:
  push:
    # `claude/prebuilt-decks-setup-script-2f3et5` is temporarily included so the
    # prebuilt-deck suite + playtest-fix batch can be acceptance-tested on the live
    # URL before merging to main. Remove it from this list once merged.
    branches: [main, claude/v2-deployment-strategy-iorlce, claude/prebuilt-decks-setup-script-2f3et5]
  workflow_dispatch:

# Least-privilege token plus the OIDC id-token the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-progress run finish rather than
# cancelling it (avoids leaving Pages in a half-deployed state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (repo root, all workspaces)
        run: npm ci

      - name: Build @mood-swings/app
        # vite.config.ts sets base to /mood-swings-vtt/ for production builds.
        run: npm run build --workspace @mood-swings/app

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: packages/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
